<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>グラフ | 節約チェッカー</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Zen+Maru+Gothic:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="css/chart.css"
    />
  </head>

  <body>
    <div class="container">
      <h1 data-i18n="appName">
        節約チェッカー
      </h1>

      <h2 data-i18n="graphTitle">
        グラフ
      </h2>

      <!-- メトリックカード -->
      <div class="metric-grid">
        <div class="metric-card">
          <p
            class="metric-label"
            data-i18n="weeklyTotal"
          >
            今週の合計
          </p>

          <p
            class="metric-value"
            id="metric-total"
          >
            0円
          </p>
        </div>

        <div class="metric-card">
          <p
            class="metric-label"
            data-i18n="largestExpense"
          >
            一番多い出費
          </p>

          <p
            class="metric-value"
            id="metric-top"
          >
            -
          </p>
        </div>

        <div class="metric-card">
          <p
            class="metric-label"
            data-i18n="categoryCount"
          >
            カテゴリ数
          </p>

          <p
            class="metric-value"
            id="metric-count"
          >
            0
          </p>
        </div>
      </div>

      <!-- 円グラフ -->
      <div class="chart-card">
        <canvas
          id="chart"
          data-i18n-aria-label="expenseChart"
          aria-label="支出カテゴリ別グラフ"
        ></canvas>
      </div>

      <!-- 一番多いカテゴリ -->
      <div class="top-category-box">
        <p
          class="top-category-label"
          data-i18n="mostSpentCategory"
        >
          今週一番使ったのは
        </p>

        <p
          class="top-category-value"
          id="top-category"
        >
          -
        </p>

        <p
          class="top-category-amount"
          id="top-amount"
        >
          0円
        </p>
      </div>

      <!-- 戻るボタン -->
      <div class="btn-group">
        <button
          type="button"
          onclick="goBackSmart()"
          class="btn-back"
          data-i18n="back"
        >
          戻る
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/chart-page.js"></script>
  </body>
</html>
