<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>先週の入力漏れ | 節約チェッカー</title>

    <link rel="stylesheet" href="css/lastweek.css" />
  </head>

  <body>
    <main class="container">
<header class="top-area">
  <div>
    <p class="app-name">先週の入力漏れ</p>
  </div>
</header>

      <section class="week-card">

        <h2 id="last-week-label">
          読み込み中...
        </h2>

        <p class="week-help">
          ここで追加した支出は、先週の履歴に保存されます。
        </p>
      </section>

      <section class="input-card">
        <div class="form-group">
          <label for="amount">金額</label>

          <div class="amount-input-wrap">
            <input
              type="number"
              id="amount"
              min="1"
              inputmode="numeric"
              placeholder="例：1200"
            />

            <span class="input-unit">円</span>
          </div>
        </div>

        <div class="form-group">
          <label for="category">カテゴリ</label>

          <select id="category">
            <option value="食費">食費</option>
            <option value="交通費">交通費</option>
            <option value="娯楽">娯楽</option>
            <option value="衝動買い">衝動買い</option>
          </select>
        </div>

        <div class="form-group">
          <label for="sat">満足度</label>

          <input
            type="number"
            id="sat"
            min="1"
            max="5"
            placeholder="1〜5"
          />

          <p class="rating-help">
            1：最低　〜　5：最高
          </p>
        </div>

        <label class="checkbox-label">
          <input type="checkbox" id="is-necessary" />

          <span class="checkbox-text">
            必需品だったらチェック
          </span>
        </label>

        <button
          type="button"
          id="add-button"
          class="btn-add"
        >
          入力リストに追加
        </button>
      </section>

      <section class="draft-card">
        <div class="draft-header">
          <div>
            <p class="draft-label">
              追加する支出
            </p>

            <h2>
              合計
              <span id="draft-total">0</span>
              円
            </h2>
          </div>

          <span id="draft-count" class="draft-count">
            0件
          </span>
        </div>

        <div id="draft-log" class="draft-log">
          <p class="empty-message">
            まだ入力されていません。
          </p>
        </div>

        <button
          type="button"
          id="save-button"
          class="btn-save"
        >
          先週の履歴に保存
        </button>
      </section>

      <div class="bottom-actions">
        <button
          type="button"
          class="btn-sub"
          onclick="window.location.href = 'index.html'"
        >
          ← メイン画面に戻る
        </button>

       
      </div>
    </main>

    <script src="js/lastweek.js" defer></script>
  </body>
</html>
