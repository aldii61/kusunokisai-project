<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>節約チェッカー | グラフ</title>

  <link rel="stylesheet" href="css/graph.css">
  <link rel="stylesheet" href="css/kakeibo-common.css" />
</head>

<body>

  <!-- ログインユーザー・ログアウト -->
   <header class="logout-wrapper">
  <button
    type="button"
    class="btn-back-mode"
    onclick="location.href='page1.html'"
  >
    <span data-i18n="backToMode">←モード選択画面に戻る</span>
  </button>

  <div class="account-area">
    <span
      id="user-display"
      class="user-status"
    ></span>

    <button
      type="button"
      class="btn-logout"
      onclick="handleLogout()"
    >
      <span data-i18n="logout">ログアウト</span>
    </button>
  </div>
</header>

  <main class="container">

    <!-- ページタイトル -->
    <div class="page-heading">
  <h1 data-i18n="appTitle">
    節約チェッカー
  </h1>

  <p data-i18n="householdMode">
    家計簿モード
  </p>
</div>


    <!-- メインメニュー -->
    <nav
  class="nav"
  aria-label="メインメニュー"
>
  <button
    type="button"
    class="nav-btn"
    onclick="location.href='normal.html'"
    data-i18n="input"
  >
    入力
  </button>

  <button
    type="button"
    class="nav-btn"
    onclick="location.href='calendar.html'"
    data-i18n="calendar"
  >
    カレンダー
  </button>

  <button
    type="button"
    class="nav-btn active"
    disabled
    aria-current="page"
    data-i18n="graph"
  >
    グラフ
  </button>
</nav>


    <!-- 月移動 -->
    <section class="month-nav">

      <button
        type="button"
        onclick="prevMonth()"
        aria-label="前の月"
      >
        ←
      </button>

      <h2 id="monthTitle"></h2>

      <button
        type="button"
        onclick="nextMonth()"
        aria-label="次の月"
      >
        →
      </button>

    </section>

<!-- 月の集計 -->
<section class="summary">
  <article class="summary-card">
    <h3 data-i18n="income">
      収入
    </h3>

    <p
      id="income"
      class="income"
    >
      0円
    </p>
  </article>

  <article class="summary-card">
    <h3 data-i18n="expense">
      支出
    </h3>

    <p
      id="expense"
      class="expense"
    >
      0円
    </p>
  </article>

  <article class="summary-card balance-card">
    <h3 data-i18n="monthlyBalance">
      今月の収支
    </h3>

    <p
      id="balance"
      class="balance"
    >
      0円
    </p>
  </article>
</section>

<!-- 支出・収入グラフ -->
<div class="charts-grid">

  <!-- 支出グラフ -->
 <section class="chart-box">
  <h3 data-i18n="expenseChart">
    支出グラフ
  </h3>

  <div class="chart-area">
    <canvas id="expenseChart"></canvas>
  </div>
</section>


  <!-- 収入グラフ -->
 <section class="chart-box">
  <h3 data-i18n="incomeChart">
    収入グラフ
  </h3>

  <div class="chart-area">
    <canvas id="incomeChart"></canvas>
  </div>
</section>

</div>

  </main>


  <!-- Chart.jsを先に読み込む -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- 自作JavaScript -->
  <script src="js/graph.js"></script>

</body>
</html>
