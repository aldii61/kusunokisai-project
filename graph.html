<!-- graph.html -->
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>節約チェッカー | グラフ分析</title>
    <link rel="stylesheet" href="css/graph.css" />
  </head>
  <body>
    <div class="container">
      <h1>節約チェッカー</h1>
      <h2>グラフ分析</h2>

      <div class="nav">
        <button onclick="location.href = 'normal.html'">入力</button>
        <button onclick="location.href = 'calendar.html'">カレンダー</button>
        <button onclick="location.href = 'graph.html'">グラフ</button>
      </div>

      <!-- 月移動 -->
      <div class="month-nav">
        <button onclick="prevMonth()">←</button>
        <h3 id="monthTitle">2026年5月</h3>
        <button onclick="nextMonth()">→</button>
      </div>

      <!-- 月集計 -->
      <div class="status">
        <h3>収入：<span id="income">0</span> 円</h3>
        <h3>支出：<span id="expense">0</span> 円</h3>
        <h3>貯金：<span id="saving">0</span> 円</h3>
      </div>

      <p id="emptyMessage" class="hidden">この月のデータはありません</p>

      <!-- グラフ -->
      <div class="chart-box">
        <canvas id="expenseChart"></canvas>
      </div>

      <div class="chart-box">
        <canvas id="incomeChart"></canvas>
      </div>

      <div class="chart-box">
        <canvas id="savingChart"></canvas>
      </div>

      <button onclick="location.href = 'calendar.html'">← カレンダーへ</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/graph.js"></script>
  </body>
</html>
