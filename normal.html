<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>節約チェッカー | 家計簿モード</title>
    <link rel="stylesheet" href="css/normal.css" />
  </head>
  <body>
    <div class="logout-wrapper">
      <span id="user-display" class="user-status"></span>
      <button onclick="handleLogout()" class="btn-logout">ログアウト</button>
    </div>

    <div class="container">
      <h1>節約チェッカー</h1>
      <h2>家計簿モード</h2>

      <div class="nav">
        <button onclick="location.href = 'normal.html'">入力</button>
        <button onclick="location.href = 'calendar.html'">カレンダー</button>
        <button onclick="location.href = 'graph.html'">グラフ</button>
      </div>

      <div class="card">
        <div class="input-area">
          <input type="date" id="date" />

          <select id="type" onchange="changeCategory()">
            <option value="支出">支出</option>
            <option value="収入">収入</option>
          </select>

          <select id="category"></select>

          <input type="number" id="amount" placeholder="金額（円）" />
          <input
            type="text"
            id="memo"
            placeholder="メモ（例：大宮まで、友達ランチ）"
          />

          <button onclick="addData()">追加</button>
          <button id="startBtn" onclick="startCamera()">カメラ起動</button>
        </div>
      </div>

      <div class="sub-nav">
        <button class="btn-mode" onclick="location.href = 'page1.html'">
          🔙 モード選択
        </button>
      </div>

      <div class="camera-wrap" id="cameraWrap" style="display: none">
        <video id="camera" autoplay playsinline></video>
        <div class="scan-frame"></div>
        <div id="scanText">レシートを枠に合わせてください</div>
      </div>
    </div>
    <canvas id="canvas" style="display: none"></canvas>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/normal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  </body>
</html>
