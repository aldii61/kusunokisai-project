<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>節約チェッカー | メイン画面</title>

  <link
    rel="stylesheet"
    href="css/index.css"
  />

  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
 <header class="logout-wrapper">
  <button
    type="button"
    class="btn-back-mode"
    onclick="location.href='page1.html'"
  >
    <span data-i18n="backToMode">
      ←モード選択画面に戻る
    </span>
  </button>

  <div class="account-area">
    <span
      id="user-display"
      class="user-status"
    ></span>

    <button
      type="button"
      class="btn-logout"
      onclick="handleLogout()"
    >
      <i data-lucide="log-out"></i>

      <span data-i18n="logout">
        ログアウト
      </span>
    </button>
  </div>
</header>

  <main class="container">
    <div class="page-heading">
      
  <h1 data-i18n="pageTitle">
  節約チェッカーモード
  </h1>
</div>

    <div class="dashboard-layout">
      <!-- =========================
           左側
      ========================== -->
      <div class="dashboard-left">

        <!-- 支出入力 -->
        <section class="card expense-card">
          <h2 class="section-title">
  <i data-lucide="pencil"></i>

  <span data-i18n="expenseInput">
    支出を入力
  </span>
</h2>

          <div class="expense-form-grid">

            <!-- 左入力欄 -->
            <div class="form-column">
              <div class="form-item">
               <label
  for="amount"
  data-i18n="amount"
>
  金額
</label>

                <div class="amount-input-wrap">
                  <span class="yen-mark">
                    ¥
                  </span>

                 <input
  type="number"
  id="amount"
  placeholder="例）1200"
  data-i18n-placeholder="amountPlaceholder"
  min="1"
/>

<span
  class="amount-unit"
  data-i18n="yenUnit"
>
  円
</span>
                </div>
              </div>

              <div class="form-item">
                <label
  for="category"
  data-i18n="category"
>
  カテゴリ
</label>

                <select id="category">
                  <option value="食費" data-i18n="categoryFood">
                    食費
                  </option>

                  <option value="交通費"  data-i18n="categoryTransport">
                    交通費
                  </option>

                  <option value="日用品" data-i18n="categoryDailyGoods">
                    日用品
                  </option>

                  <option value="娯楽" data-i18n="categoryEntertainment">
                    娯楽
                  </option>

                  <option value="学習" data-i18n="categoryStudy">
                    学習
                  </option>

                  <option value="衝動買い" data-i18n="categoryImpulse">
                    衝動買い
                  </option>
                </select>
              </div>
            </div>

            <!-- 右入力欄 -->
            <div class="form-column">
              <div
                class="form-item satisfaction-form-item"
              >
                <span
  class="form-label"
  data-i18n="satisfaction"
>
  満足度
</span>

                <div
                  class="satisfaction-group"
                  role="radiogroup"
                  aria-label="満足度"
                >
                  <label class="satisfaction-item">
                    <input
                      type="radio"
                      name="satisfaction"
                      value="1"
                    />

                    <span class="face-icon">
                      <i data-lucide="frown"></i>
                    </span>

                    <span class="face-label" data-i18n="satisfactionRegret">
                      後悔
                    </span>
                  </label>

                  <label class="satisfaction-item">
                    <input
                      type="radio"
                      name="satisfaction"
                      value="2"
                    />

                    <span class="face-icon">
                      <i data-lucide="annoyed"></i>
                    </span>

                    <span class="face-label"  data-i18n="satisfactionPoor">
                      いまいち
                    </span>
                  </label>

                  <label class="satisfaction-item">
                    <input
                      type="radio"
                      name="satisfaction"
                      value="3"
                      checked
                    />

                    <span class="face-icon">
                      <i data-lucide="meh"></i>
                    </span>

                    <span class="face-label" data-i18n="satisfactionNormal">
                      普通
                    </span>
                  </label>

                  <label class="satisfaction-item">
                    <input
                      type="radio"
                      name="satisfaction"
                      value="4"
                    />

                    <span class="face-icon">
                      <i data-lucide="smile"></i>
                    </span>

                    <span class="face-label"  data-i18n="satisfactionSatisfied">
                      満足
                    </span>
                  </label>

                  <label class="satisfaction-item">
                    <input
                      type="radio"
                      name="satisfaction"
                      value="5"
                    />

                    <span class="face-icon">
                      <i data-lucide="laugh"></i>
                    </span>

                    <span class="face-label" data-i18n="satisfactionVerySatisfied">
                      大満足
                    </span>
                  </label>
                </div>
              </div>

              <label class="round-checkbox-label">
                <input
                  type="checkbox"
                  id="is-necessary"
                />

                <span class="checkmark"></span>

                <span data-i18n="necessaryCheck">
                  必需品だったらチェック
                </span>
              </label>
            </div>
          </div>

          <!-- 追加・保存 -->
          <div class="expense-action-row">
            <button
  type="button"
  class="btn-tsuika"
  onclick="addExpense()"
>
  <i data-lucide="circle-plus"></i>

  <span data-i18n="add">
    追加
  </span>
</button>

<button
  type="button"
  class="btn-save"
  onclick="saveCurrentWeek()"
>
  <i data-lucide="save"></i>

  <span data-i18n="saveWeek">
    今週分を保存
  </span>
</button>
          </div>
        </section>

        <!-- 最近の履歴 -->
        <section class="status history-card">
          <div class="history-heading">
            <h2 class="section-title">
  <i data-lucide="clipboard-list"></i>

  <span data-i18n="recentHistory">
    最近の履歴
  </span>
</h2>

<h3>
  <span data-i18n="totalLabel">
    合計：
  </span>

  <span id="total">0</span>

  <span data-i18n="yenUnit">
    円
  </span>
</h3>
          </div>

          <div id="log"></div>
        </section>

        <!-- メニュー -->
        <section class="navigation-panel">
          <div class="dashboard-menu-grid">

<button
  type="button"
  class="menu-button menu-chart"
  onclick="goToChart()"
>
  <i data-lucide="chart-no-axes-column"></i>

  <span data-i18n="chart">
    グラフ
  </span>
</button>

<button
  type="button"
  class="menu-button menu-history"
  onclick="location.href='history.html'"
>
  <i data-lucide="history"></i>

  <span data-i18n="history">
    履歴
  </span>
</button>

<button
  type="button"
  class="menu-button menu-advice"
  onclick="goToAdvice()"
>
  <i data-lucide="lightbulb"></i>

  <span data-i18n="analysis">
    分析
  </span>
</button>
            
              

            
          </div>
        </section>


        <!-- 先週分 -->
    <div class="lastweek-link-area">
  <button
    type="button"
    class="btn-lastweek"
    onclick="location.href='lastweek.html'"
  >
    <i data-lucide="calendar-plus"></i>

    <span data-i18n="addLastWeek">
      先週の入力漏れを追加
    </span>
  </button>
</div>

<div class="category-link-area">
  <button
    type="button"
    class="btn-category"
    onclick="location.href='category.html?from=checker'"
  >
    <i data-lucide="tags"></i>

    <span data-i18n="manageCategories">
      カテゴリの追加・削除
    </span>
  </button>
</div>
        </div>

     

      <!-- =========================
           右側
      ========================== -->
      <div class="dashboard-right">

        <!-- ペット -->
        <section class="card pet-card">
          <h2 class="section-title">
  <i data-lucide="paw-print"></i>

  <span data-i18n="popoTitle">
    節約応援犬ぽぽちゃん
  </span>
</h2>
          <!-- 予算 -->
          <div class="weekly-budget-row">
            <span
  class="weekly-budget-label"
  data-i18n="weeklyBudget"
>
  今週の目標予算
</span>

            <div class="weekly-budget-input-wrap">
              <input
                type="number"
                id="weekly-limit-input"
                value="20000"
                min="1"
                onchange="saveWeeklyLimit()"
              />

              <span  data-i18n="yenUnit">円</span>
            </div>
          </div>

          <!-- ペット情報 -->
          <div class="pet-main-area">
            <div class="pet-character-area">
              <div class="pet-stage">

                <!-- 通常画像 -->
                <img
                  id="pet-image"
                  class="pet-image"
                  src="image/popo-happy.jpg"
                  alt="節約を応援するポポ"
                />

                <!-- 食事動画 -->
                <video
                  id="pet-eating-video"
                  class="pet-eating-video"
                  src="image/popo-eating.webm"
                  muted
                  hidden
                  playsinline
                ></video>

                <!-- 頭アクセサリー -->
                <img
                  id="head-accessory"
                  class="pet-accessory"
                  alt=""
                />

                <!-- メガネ -->
                <img
                  id="eye-accessory"
                  class="pet-accessory"
                  alt=""
                />

                <!-- リボン -->
                <img
                  id="neck-accessory"
                  class="pet-accessory"
                  alt=""
                />
              </div>
            </div>

            <div class="pet-information">
             <div class="pet-info-box">
  <span
    class="pet-info-label"
    data-i18n="condition"
  >
    コンディション
  </span>

  <strong id="pet-condition">
    元気
  </strong>
</div>

<div class="pet-info-box">
  <span
    class="pet-info-label"
    data-i18n="points"
  >
    ポイント
  </span>

  <div class="point-display">
    <span class="coin-icon">
      P
    </span>

    <strong>
      <span id="point-value">
        0
      </span>
      pt
    </strong>
  </div>
</div>
                  
            </div>
          </div>

          <!-- 吹き出し -->
          <div class="pet-bubble">
            <span class="bubble-tail"></span>

            <p id="pet-message">
              今週は何円節約できるかワン？
            </p>

            <i
              data-lucide="paw-print"
              class="bubble-paw"
            ></i>
          </div>

          <!-- ショップ -->
          <div class="pet-shop-container">
            <div class="shop-heading">
  <i data-lucide="shopping-bag"></i>

  <span data-i18n="shop">
    ショップ
  </span>
</div>

            <!-- 常時表示商品 -->
            <div class="shop-buttons-group">

              <!-- 肉 -->
              <button
                type="button"
                class="shop-item-card"
                onclick="buyShopItem('meat')"
              >
                <img
                  src="image/meat.png"
                  alt="肉"
                  class="shop-item-image shop-meat"
                />

                <span class="shop-item-name" data-i18n="meat">
                  お肉
                </span>

                <span class="shop-item-price">
                  <span class="mini-coin">
                    P
                  </span>

                  20 pt
                </span>
              </button>

              <!-- 麦わら帽子 -->
              <button
                type="button"
                class="shop-item-card"
                onclick="buyShopItem('strawHat')"
              >
                <img
                  src="image/straw-hat.png"
                  alt="麦わら帽子"
  class="shop-item-image shop-straw-hat"
                />

                <span class="shop-item-name" data-i18n="strawHat">
                  麦わら帽子
                </span>

                <span class="shop-item-price">
                  <span class="mini-coin">
                    P
                  </span>

                  60 pt
                </span>
              </button>

              <!-- リボン -->
              <button
                type="button"
                class="shop-item-card"
                onclick="buyShopItem('ribbon')"
              >
                <img
                  src="image/ribbon.png"
                  alt="リボン"
  class="shop-item-image shop-ribbon"
                />

                <span class="shop-item-name" data-i18n="ribbon">
                  リボン
                </span>

                <span class="shop-item-price" >
                  <span class="mini-coin">
                    P
                  </span>

                  40 pt
                </span>
              </button>
            </div>

            <!-- もっと見る -->
            <button
  type="button"
  id="shop-more-button"
  class="btn-shop-more"
  onclick="toggleMoreShop()"
>
  <span id="shop-more-text" data-i18n="showMore">もっと見る</span>
  <i
    id="shop-more-icon"
    data-lucide="chevron-down"
  ></i>
</button>

<div
  id="more-shop-items"
  class="more-shop-items"
>
  <div class="shop-buttons-group">

    <button
      type="button"
      class="shop-item-card"
      onclick="buyShopItem('glasses')"
    >
      <img
        src="image/glasses.png"
        alt="メガネ"
        class="shop-item-image shop-glasses"
      />

      <span class="shop-item-name" data-i18n="glasses">
        メガネ
      </span>

      <span class="shop-item-price">
        <span class="mini-coin">P</span>
        50 pt
      </span>
    </button>

    <button
      type="button"
      class="shop-item-card"
      onclick="buyShopItem('studentHat')"
    >
      <img
        src="image/student-hat.png"
        alt="学生帽"
        class="shop-item-image shop-student-hat"
      />

      <span class="shop-item-name" data-i18n="studentHat">
        学生帽
      </span>

      <span class="shop-item-price">
        <span class="mini-coin">P</span>
        70 pt
      </span>
    </button>

    <button
      type="button"
      class="shop-item-card"
      onclick="buyShopItem('catEars')"
    >
      <img
        src="image/cat-ears.png"
        alt="猫耳"
        class="shop-item-image shop-cat-ears"
      />

      <span class="shop-item-name" data-i18n="catEars">
        猫耳
      </span>

      <span class="shop-item-price">
        <span class="mini-coin">P</span>
        80 pt
      </span>
    </button>

  </div>
</div>

            <!-- 外すボタン -->
            <div class="remove-item-buttons">
  <button
    type="button"
    onclick="removeAccessory('head')"
    data-i18n="removeHeadAccessory"
  >
    帽子・耳飾りを外す
  </button>

  <button
    type="button"
    onclick="removeAccessory('eyes')"
    data-i18n="removeGlasses"
  >
    メガネを外す
  </button>

  <button
    type="button"
    onclick="removeAccessory('neck')"
    data-i18n="removeRibbon"
  >
    リボンを外す
  </button>
</div>
          </div>
        </section>

        
  <!-- 先週レポート -->
  <div
    id="welcome-modal"
    class="modal-overlay"
    style="display: none"
  >
    <div class="modal-content">
      <button
        type="button"
        class="modal-close-btn"
        onclick="closeWelcomeModal()"
        aria-label="閉じる"
      >
        &times;
      </button>

      <div
        class="modal-icon"
        id="modal-icon"
      >
        🏆
      </div>

      <h2
  id="modal-title"
  data-i18n="lastWeekReport"
>
  先週のレポート
</h2>

<p
  id="modal-message"
  data-i18n="loading"
>
  読み込み中です...
</p>

<button
  type="button"
  class="modal-action-btn"
  onclick="closeWelcomeModal()"
  data-i18n="doBestThisWeek"
>
  今週も頑張る！
</button>
    </div>
  </div>
 
<script src="js/app.js"></script>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
